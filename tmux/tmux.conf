################################################################################
#   tmux configuration file
#    ___ ___  ___   _         _                   
#   | __| _ \/ __| /_\ ___ _ | |__ _ _ __  ___ ___
#   | _||  _| (_ |/ _ |___| || / _` | '  \/ -_(_-<
#   |_| |_|  \___/_/ \_\   \__/\__,_|_|_|_\___/__/
#  
################################################################################


################################################################################
## Key Bindings
################################################################################

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

################################################################################
## Navigation & Control
################################################################################
# switch panes using Alt-arrow without prefix
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R
# Resize the current pane using Alt + direction
#bind -n M-k resize-pane -U 5
#bind -n M-j resize-pane -D 5
#bind -n M-h resize-pane -L 5
#bind -n M-l resize-pane -R 5

# Splitting terminals using | and - (retain current path)
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"


# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename on

# Performance & UX
set -s escape-time 0
set -g history-limit 50000
set -g set-clipboard on
set -g status-interval 5

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Open current directory
# bind o run-shell "open #{pane_current_path}"

# loud or quiet?
#set -g visual-activity off
#set -g visual-bell on
#set -g visual-silence off
#setw -g monitor-activity on
#set -g bell-action none
#set -g mouse-select-window on

################################################################################ 
# Display
################################################################################
# Start windows and panes # with 1 (not 0), and renumber on close.
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g default-terminal "tmux-256color"
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'alexwforsythe/tmux-which-key'
# set -g @plugin 'dracula/tmux'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,  ,}"

### Catppuccin settings
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha

# Load status modules
source -F "#{d:current_file}/../../../plugins/tmux/status/cpu.conf"
source -F "#{d:current_file}/../../../plugins/tmux/status/session.conf"
source -F "#{d:current_file}/../../../plugins/tmux/status/battery.conf"
source -F "#{d:current_file}/../../../plugins/tmux/status/date_time.conf"

# Make the status line pretty and add some modules
set -g status-right-length 150
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_nowplaying}"
set -ag status-right "#(icalBuddy -li 1 -tf '%H:%M' -df '' -nrd -b '' -nc -iep 'title,datetime' eventsToday | tr -d '\n') "
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
### Dracula settings
# set -g @dracula-show-powerline true
# set -g @dracula-fixed-location "Glasgow UK"
# set -g @dracula-plugins "weather"
# set -g @dracula-show-fahrenheit false
# set -g @dracula-show-flags true
# set -g @dracula-show-left-icon session
# set -g @dracula-battery-label "Battery"
set -g status-position top

### Resurrect & Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

### Sessionx
set -g @sessionx-bind 'o'

run '~/.config/tmux/plugins/tpm/tpm'
