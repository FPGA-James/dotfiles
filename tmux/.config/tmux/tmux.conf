################################################################################
#   tmux configuration file
#    ___ ___  ___   _         _                   
#   | __| _ \/ __| /_\ ___ _ | |__ _ _ __  ___ ___
#   | _||  _| (_ |/ _ |___| || / _` | '  \/ -_(_-<
#   |_| |_|  \___/_/ \_\   \__/\__,_|_|_|_\___/__/
#  
################################################################################


################################################################################
## Key Bindings
################################################################################

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

################################################################################
## Navigation & Control
################################################################################
# switch panes using Alt-arrow without prefix
# bind -n M-Left select-pane -L
# bind -n M-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R
# Resize the current pane using Alt + direction
#bind -n M-k resize-pane -U 5
#bind -n M-j resize-pane -D 5
#bind -n M-h resize-pane -L 5
#bind -n M-l resize-pane -R 5

# Splitting terminals using | and -
unbind '"'
unbind %
bind '\' split-window -h
bind - split-window -v


# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on
set -g mouse-select-pane on
set -g mouse-resize-pane on

# don't rename windows automatically
set-option -g allow-rename on

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Open current directory
# bind o run-shell "open #{pane_current_path}"

# loud or quiet?
#set -g visual-activity off
#set -g visual-bell on
#set -g visual-silence off
#setw -g monitor-activity on
#set -g bell-action none
#set -g mouse-select-window on

################################################################################
# Display
################################################################################
# Start windows and panes # with 1 (not 0), and renumber on close.
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g default-terminal "tmux-256color"
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux' # See https://github.com/catppuccin/tmux/tags for additional tags
# set -g @plugin 'dracula/tmux'
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

### Catppuccin settings 
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
### Dracula settings
# set -g @dracula-show-powerline true
# set -g @dracula-fixed-location "Glasgow UK"
# set -g @dracula-plugins "weather"
# set -g @dracula-show-fahrenheit false
# set -g @dracula-show-flags true
# set -g @dracula-show-left-icon session
# set -g @dracula-battery-label "Battery"
set -g status-position top

run '~/.config/tmux/plugins/tpm/tpm'
